name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: mmot-linux-x86_64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: mmot-macos-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: mmot-macos-aarch64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: mmot-windows-x86_64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2

      - name: Install build deps (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y python3 nasm libfontconfig-dev libgl-dev libgles2-mesa-dev

      - name: Install nasm (macOS)
        if: runner.os == 'macOS'
        run: brew install nasm

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }} -p mmot

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../${{ matrix.artifact }}.tar.gz mmot
          cd ../../..

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          7z a ../../../${{ matrix.artifact }}.zip mmot.exe
          cd ../../..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            mmot-linux-x86_64.tar.gz
            mmot-macos-x86_64.tar.gz
            mmot-macos-aarch64.tar.gz
            mmot-windows-x86_64.zip
